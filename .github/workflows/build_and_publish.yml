name: Build and publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: ubuntu-latest
            platform: android
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v2

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev zip

      - name: Enable Linux desktop
        if: matrix.platform == 'linux'
        run: flutter config --enable-linux-desktop

      - name: Enable macOS desktop
        if: matrix.platform == 'macos'
        run: flutter config --enable-macos-desktop

      - name: Enable Windows desktop
        if: matrix.platform == 'windows'
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build Android
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: flutter build windows --release

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          rm -rf dist package
          mkdir -p dist package/linux
          cp -R build/linux/x64/release/bundle/. package/linux/
          cd package
          zip -r ../dist/opendevnote-linux.zip linux

      - name: Package Android
        if: matrix.platform == 'android'
        run: |
          rm -rf dist
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/opendevnote-android.apk

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: |
          rm -rf dist package
          mkdir -p dist package/macos
          cp -R build/macos/Build/Products/Release/opendevnote.app package/macos/
          cd package
          zip -r ../dist/opendevnote-macos.zip macos

      - name: Package Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force dist, package -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist, package\windows | Out-Null
          Copy-Item -Recurse -Force build\windows\x64\runner\Release\* package\windows\
          Compress-Archive -Path package\windows\* -DestinationPath dist\opendevnote-windows.zip

      - name: Verify packaged files
        shell: bash
        run: |
          echo "Packaged files:"
          find dist -maxdepth 2 -type f -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendevnote-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: ls -R artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: opendevnote v${{ github.run_number }}
          working_directory: artifacts
          files: |
            **/*.zip
            **/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}